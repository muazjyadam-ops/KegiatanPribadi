<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Kegiatan Pribadi</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --purple: #5B3AF5;
    --purple-dark: #4A2FE0;
    --purple-light: #EEEDFE;
    --green: #1D9E75;
    --green-light: #EAF3DE;
    --amber: #BA7517;
    --amber-light: #FAEEDA;
    --red: #E24B4A;
    --red-light: #FCEBEB;
    --blue: #185FA5;
    --blue-light: #E6F1FB;
    --bg: #F7F6FF;
    --surface: #FFFFFF;
    --border: rgba(91,58,245,0.12);
    --border-md: rgba(91,58,245,0.22);
    --text: #1A1530;
    --text-muted: #6B6780;
    --text-hint: #A09DBF;
    --radius: 14px;
    --radius-sm: 8px;
    --shadow: 0 2px 16px rgba(91,58,245,0.08);
  }
  @media(prefers-color-scheme:dark){
    :root{
      --bg:#100E1E;--surface:#1A1730;--border:rgba(255,255,255,0.08);--border-md:rgba(255,255,255,0.14);
      --text:#F0EEF8;--text-muted:#9A97B8;--text-hint:#5A5778;--purple-light:#2A1F5A;--green-light:#0A2A1E;
      --amber-light:#2A1E06;--red-light:#2A0F0F;--blue-light:#0A1E36;--shadow:0 2px 16px rgba(0,0,0,0.4);
    }
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5}
  .app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg);display:flex;flex-direction:column}

  /* HEADER */
  .header{background:var(--purple);padding:20px 20px 16px;position:sticky;top:0;z-index:50}
  .header-row{display:flex;align-items:center;justify-content:space-between}
  .header-brand{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:#fff;letter-spacing:-0.5px}
  .header-date{font-size:12px;color:rgba(255,255,255,0.7);margin-top:2px}
  .avatar{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:#fff;cursor:pointer;border:2px solid rgba(255,255,255,0.3)}

  /* NAV */
  .nav{display:flex;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:88px;z-index:40;box-shadow:var(--shadow)}
  .nav-btn{flex:1;padding:10px 2px 8px;border:none;background:transparent;color:var(--text-muted);font-size:10px;font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:color 0.2s;position:relative}
  .nav-btn.active{color:var(--purple)}
  .nav-btn.active::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:2px;background:var(--purple);border-radius:2px 2px 0 0}
  .nav-icon{font-size:18px;line-height:1}

  /* CONTENT */
  .content{flex:1;overflow-y:auto;padding-bottom:80px}
  .section{padding:16px}
  .sec-title{font-size:11px;font-weight:600;color:var(--text-hint);letter-spacing:0.8px;text-transform:uppercase;margin-bottom:10px}

  /* STAT CARDS */
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
  .stat-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:14px 16px;position:relative;overflow:hidden}
  .stat-card::before{content:'';position:absolute;top:-12px;right:-12px;width:48px;height:48px;border-radius:50%;opacity:0.12}
  .stat-card.s-purple::before{background:var(--purple)}
  .stat-card.s-green::before{background:var(--green)}
  .stat-card.s-amber::before{background:var(--amber)}
  .stat-card.s-blue::before{background:var(--blue)}
  .stat-num{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;line-height:1}
  .stat-num.c-purple{color:var(--purple)}.stat-num.c-green{color:var(--green)}.stat-num.c-amber{color:var(--amber)}.stat-num.c-blue{color:var(--blue)}
  .stat-label{font-size:11px;color:var(--text-muted);margin-top:4px}

  /* PROGRESS */
  .prog-wrap{margin-bottom:16px;background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:14px 16px}
  .prog-row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:8px}
  .prog-bar{width:100%;height:6px;background:var(--border);border-radius:6px;overflow:hidden}
  .prog-fill{height:100%;background:linear-gradient(90deg,var(--purple),#8B6FF7);border-radius:6px;transition:width 0.5s ease}

  /* TASK CARD */
  .task-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:8px;transition:border-color 0.2s}
  .task-card:hover{border-color:var(--border-md)}
  .task-card.done-card{opacity:0.65}
  .task-top{display:flex;align-items:flex-start;gap:10px}
  .check-btn{width:24px;height:24px;border-radius:50%;border:2px solid var(--border-md);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all 0.15s;margin-top:1px}
  .check-btn.checked{background:var(--green);border-color:var(--green);color:#fff}
  .task-body{flex:1;min-width:0}
  .task-title{font-size:14px;font-weight:600;line-height:1.4;word-break:break-word}
  .task-title.done-text{text-decoration:line-through;color:var(--text-muted)}
  .task-desc{font-size:12px;color:var(--text-muted);margin-top:3px;word-break:break-word}
  .task-meta{display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap}
  .badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
  .badge-penting{background:var(--red-light);color:var(--red)}
  .badge-biasa{background:var(--blue-light);color:var(--blue)}
  .badge-selesai{background:var(--green-light);color:var(--green)}
  .meta-tag{font-size:11px;color:var(--text-muted);display:flex;align-items:center;gap:3px}
  .task-actions{display:flex;gap:4px;flex-shrink:0}
  .icon-btn{width:28px;height:28px;border:none;background:transparent;cursor:pointer;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--text-muted);transition:all 0.15s}
  .icon-btn:hover{background:var(--red-light);color:var(--red)}
  .icon-btn.view-btn:hover{background:var(--blue-light);color:var(--blue)}

  /* ATTACHMENTS */
  .attach-list{margin-top:10px;display:flex;flex-direction:column;gap:6px}
  .attach-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg);border-radius:var(--radius-sm);border:1px solid var(--border)}
  .attach-icon{font-size:18px;flex-shrink:0}
  .attach-name{font-size:12px;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .attach-size{font-size:11px;color:var(--text-muted);white-space:nowrap}
  .attach-img-preview{width:40px;height:40px;object-fit:cover;border-radius:6px;flex-shrink:0}
  .add-attach-btn{margin-top:8px;font-size:12px;color:var(--purple);font-weight:600;cursor:pointer;background:none;border:none;padding:0;font-family:inherit}

  /* BERKAS TAB */
  .berkas-img-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
  .berkas-img-item{border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border);position:relative;cursor:pointer}
  .berkas-img-item img{width:100%;height:100px;object-fit:cover;display:block}
  .berkas-img-caption{padding:6px 8px;background:var(--surface)}
  .berkas-img-name{font-size:11px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .berkas-img-sub{font-size:10px;color:var(--text-muted)}
  .berkas-doc-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
  .berkas-doc-icon{width:40px;height:40px;border-radius:10px;background:var(--purple-light);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
  .berkas-doc-info{flex:1;min-width:0}
  .berkas-doc-name{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .berkas-doc-meta{font-size:11px;color:var(--text-muted);margin-top:2px}
  .berkas-doc-task{font-size:11px;color:var(--purple);margin-top:2px;font-weight:500}

  /* CALENDAR */
  .cal-month{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;margin-bottom:12px}
  .cal-hdr{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px}
  .cal-hdr span{font-size:11px;text-align:center;color:var(--text-muted);font-weight:600}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
  .cal-day{aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;position:relative;font-weight:500;transition:background 0.15s}
  .cal-day:hover{background:var(--purple-light)}
  .cal-day.today{background:var(--purple);color:#fff;font-weight:700}
  .cal-day.has-ev::after{content:'';width:4px;height:4px;border-radius:50%;background:var(--green);position:absolute;bottom:3px;left:50%;transform:translateX(-50%)}

  /* HABITS */
  .habit-row{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--border)}
  .habit-row:last-child{border-bottom:none}
  .habit-icon{font-size:22px;flex-shrink:0}
  .habit-info{flex:1;min-width:0}
  .habit-name{font-size:14px;font-weight:600}
  .habit-streak{font-size:11px;color:var(--text-muted);margin-top:2px}
  .habit-dots{display:flex;gap:3px}
  .hdot{width:11px;height:11px;border-radius:50%;border:2px solid var(--border-md);transition:all 0.2s}
  .hdot.done{background:var(--green);border-color:var(--green)}
  .habit-check{padding:5px 12px;border-radius:20px;border:1.5px solid var(--border-md);background:transparent;color:var(--text);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.15s}
  .habit-check.checked{background:var(--green);border-color:var(--green);color:#fff}

  /* EMPTY STATE */
  .empty{text-align:center;padding:32px 16px;color:var(--text-muted)}
  .empty-icon{font-size:40px;margin-bottom:10px}
  .empty p{font-size:13px}

  /* FAB */
  .fab-wrap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:100;width:100%;max-width:480px;display:flex;justify-content:flex-end;padding:0 20px;pointer-events:none}
  .fab{width:54px;height:54px;border-radius:50%;background:var(--purple);color:#fff;border:none;font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 24px rgba(91,58,245,0.45);pointer-events:auto;transition:transform 0.15s,box-shadow 0.15s}
  .fab:hover{transform:scale(1.08);box-shadow:0 8px 28px rgba(91,58,245,0.55)}
  .fab:active{transform:scale(0.96)}

  /* MODALS */
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px)}
  .overlay.open{display:flex}
  .modal{background:var(--surface);border-radius:24px 24px 0 0;padding:24px 20px 32px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;animation:slideup 0.28s cubic-bezier(0.34,1.56,0.64,1)}
  @keyframes slideup{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
  .modal-handle{width:36px;height:4px;border-radius:2px;background:var(--border-md);margin:0 auto 20px}
  .modal h2{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;margin-bottom:18px}
  .form-group{margin-bottom:14px}
  .form-label{font-size:12px;font-weight:600;color:var(--text-muted);letter-spacing:0.3px;display:block;margin-bottom:6px}
  .form-input{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;outline:none;transition:border-color 0.2s}
  .form-input:focus{border-color:var(--purple)}
  textarea.form-input{resize:vertical;min-height:72px}
  select.form-input{appearance:none;cursor:pointer}
  .upload-zone{border:2px dashed var(--border-md);border-radius:var(--radius);padding:20px;text-align:center;cursor:pointer;background:var(--bg);transition:all 0.2s}
  .upload-zone:hover,.upload-zone.drag{border-color:var(--purple);background:var(--purple-light)}
  .upload-zone-icon{font-size:32px;margin-bottom:8px}
  .upload-zone p{font-size:13px;color:var(--text-muted)}
  .upload-zone strong{color:var(--purple)}
  .pending-files{margin-top:10px;display:flex;flex-direction:column;gap:6px}
  .pf-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm)}
  .pf-icon{font-size:18px;flex-shrink:0}
  .pf-name{font-size:12px;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pf-size{font-size:11px;color:var(--text-muted);white-space:nowrap}
  .pf-rm{border:none;background:transparent;color:var(--text-muted);cursor:pointer;font-size:16px;padding:0 2px;line-height:1}
  .pf-rm:hover{color:var(--red)}
  .modal-btns{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px}
  .btn{padding:12px;border:1.5px solid var(--border-md);border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;background:transparent;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;transition:all 0.15s}
  .btn:hover{background:var(--bg)}
  .btn-primary{background:var(--purple);color:#fff;border-color:var(--purple)}
  .btn-primary:hover{background:var(--purple-dark)}
  .cat-chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .cat-chip{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;border:1.5px solid var(--border);cursor:pointer;background:var(--surface);color:var(--text-muted);transition:all 0.15s}
  .cat-chip.active{background:var(--purple);color:#fff;border-color:var(--purple)}
  .view-img{width:100%;border-radius:var(--radius-sm);margin-top:10px}
  .view-doc-wrap{text-align:center;padding:24px 16px}
  .view-doc-icon{font-size:56px;margin-bottom:12px}
  .view-doc-name{font-size:15px;font-weight:600;margin-bottom:4px;word-break:break-word}
  .view-doc-size{font-size:12px;color:var(--text-muted)}
  .download-btn{display:inline-flex;align-items:center;gap:8px;margin-top:16px;padding:10px 24px;background:var(--purple);color:#fff;border-radius:var(--radius-sm);font-size:13px;font-weight:600;text-decoration:none;border:none;cursor:pointer;font-family:inherit}

  /* SCROLLBAR */
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--border-md);border-radius:4px}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="header-row">
      <div>
        <div class="header-brand">Kegiatan Saya</div>
        <div class="header-date" id="hdrDate"></div>
      </div>
      <div class="avatar">AK</div>
    </div>
  </div>

  <div class="nav">
    <button class="nav-btn active" onclick="showTab('beranda')" id="tab-beranda"><span class="nav-icon">⊞</span><span>Beranda</span></button>
    <button class="nav-btn" onclick="showTab('tugas')" id="tab-tugas"><span class="nav-icon">✓</span><span>Tugas</span></button>
    <button class="nav-btn" onclick="showTab('berkas')" id="tab-berkas"><span class="nav-icon">📁</span><span>Berkas</span></button>
    <button class="nav-btn" onclick="showTab('kalender')" id="tab-kalender"><span class="nav-icon">◫</span><span>Kalender</span></button>
    <button class="nav-btn" onclick="showTab('kebiasaan')" id="tab-kebiasaan"><span class="nav-icon">⚡</span><span>Kebiasaan</span></button>
  </div>

  <div class="content" id="mainContent"></div>
</div>

<div class="fab-wrap" id="fabWrap">
  <button class="fab" id="fabBtn">+</button>
</div>

<!-- TASK MODAL -->
<div class="overlay" id="taskModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="modalTitle">Tambah Tugas</h2>
    <div class="form-group">
      <label class="form-label">Judul kegiatan</label>
      <input type="text" class="form-input" id="iJudul" placeholder="Nama kegiatan...">
    </div>
    <div class="form-group">
      <label class="form-label">Keterangan</label>
      <textarea class="form-input" id="iKet" placeholder="Deskripsi, catatan, atau spesifikasi..."></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Tanggal & Waktu</label>
      <input type="datetime-local" class="form-input" id="iTgl">
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="form-group">
        <label class="form-label">Prioritas</label>
        <select class="form-input" id="iPrioritas">
          <option value="biasa">Biasa</option>
          <option value="penting">⚡ Penting</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Kategori</label>
        <select class="form-input" id="iKat">
          <option value="kerja">💼 Kerja</option>
          <option value="pribadi">👤 Pribadi</option>
          <option value="kesehatan">❤️ Kesehatan</option>
          <option value="belajar">📚 Belajar</option>
          <option value="lainnya">📌 Lainnya</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Lampiran / Bukti / Spesifikasi</label>
      <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
        <div class="upload-zone-icon">📎</div>
        <p><strong>Klik</strong> atau seret file ke sini</p>
        <p style="font-size:11px;margin-top:4px">Gambar, PDF, Word, Excel, ZIP, Video, dll</p>
      </div>
      <input type="file" id="fileInput" multiple accept="*/*" style="display:none">
      <div class="pending-files" id="pendingFiles"></div>
    </div>
    <div class="modal-btns">
      <button class="btn" onclick="closeTaskModal()">Batal</button>
      <button class="btn btn-primary" onclick="saveTask()">Simpan</button>
    </div>
  </div>
</div>

<!-- HABIT MODAL -->
<div class="overlay" id="habitModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>Tambah Kebiasaan</h2>
    <div class="form-group">
      <label class="form-label">Nama kebiasaan</label>
      <input type="text" class="form-input" id="iHabit" placeholder="cth: Olahraga pagi...">
    </div>
    <div class="form-group">
      <label class="form-label">Ikon</label>
      <select class="form-input" id="iHabitIcon">
        <option value="🏃">🏃 Olahraga</option>
        <option value="📖">📖 Membaca</option>
        <option value="💧">💧 Minum air</option>
        <option value="🧘">🧘 Meditasi</option>
        <option value="✍️">✍️ Menulis</option>
        <option value="🥗">🥗 Makan sehat</option>
        <option value="😴">😴 Tidur cukup</option>
        <option value="⭐">⭐ Lainnya</option>
      </select>
    </div>
    <div class="modal-btns">
      <button class="btn" onclick="document.getElementById('habitModal').classList.remove('open')">Batal</button>
      <button class="btn btn-primary" onclick="saveHabit()">Simpan</button>
    </div>
  </div>
</div>

<!-- VIEW FILE MODAL -->
<div class="overlay" id="viewModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="viewTitle" style="font-size:16px;word-break:break-word"></h2>
    <div id="viewContent"></div>
    <div style="margin-top:20px">
      <button class="btn btn-primary" style="width:100%" onclick="document.getElementById('viewModal').classList.remove('open')">Tutup</button>
    </div>
  </div>
</div>

<script>
const DAYS=['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
const MONTHS=['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
const CAT_ICON={kerja:'💼',pribadi:'👤',kesehatan:'❤️',belajar:'📚',lainnya:'📌'};
const now=new Date();

let tasks=[];let habits=[];let habitLog={};let pendingFiles=[];let filterCat='semua';let currentTab='beranda';let addFileForId=null;

function load(){
  try{
    const t=localStorage.getItem('mgk_tasks');if(t)tasks=JSON.parse(t);
    const h=localStorage.getItem('mgk_habits');if(h)habits=JSON.parse(h);
    const l=localStorage.getItem('mgk_hlog');if(l)habitLog=JSON.parse(l);
  }catch(e){tasks=[];habits=[];habitLog={};}
}
function save(){
  try{
    localStorage.setItem('mgk_tasks',JSON.stringify(tasks));
    localStorage.setItem('mgk_habits',JSON.stringify(habits));
    localStorage.setItem('mgk_hlog',JSON.stringify(habitLog));
  }catch(e){alert('Storage penuh. Hapus beberapa berkas lama.');}
}
load();

document.getElementById('hdrDate').textContent=DAYS[now.getDay()]+', '+now.getDate()+' '+MONTHS[now.getMonth()]+' '+now.getFullYear();

function fIcon(name){
  if(!name)return'📄';
  const e=(name.split('.').pop()||'').toLowerCase();
  if(['jpg','jpeg','png','gif','webp','svg','bmp'].includes(e))return'🖼️';
  if(e==='pdf')return'📕';
  if(['doc','docx'].includes(e))return'📝';
  if(['xls','xlsx','csv'].includes(e))return'📊';
  if(['ppt','pptx'].includes(e))return'📋';
  if(['zip','rar','7z','tar','gz'].includes(e))return'🗜️';
  if(['mp4','mov','avi','mkv','webm'].includes(e))return'🎬';
  if(['mp3','wav','ogg','aac','flac'].includes(e))return'🎵';
  if(['txt','md'].includes(e))return'📄';
  if(['js','ts','py','html','css','json','xml'].includes(e))return'💻';
  return'📄';
}
function fSize(b){if(b<1024)return b+'B';if(b<1048576)return Math.round(b/1024)+'KB';return(b/1048576).toFixed(1)+'MB';}
function fDate(s){if(!s)return'';const d=new Date(s);return d.toLocaleDateString('id-ID',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});}

function showTab(tab){
  currentTab=tab;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  const fw=document.getElementById('fabWrap');
  fw.style.display=tab==='kalender'?'none':'flex';
  const fab=document.getElementById('fabBtn');
  if(tab==='kebiasaan')fab.onclick=()=>document.getElementById('habitModal').classList.add('open');
  else fab.onclick=openAddModal;
  render();
}

function render(){
  const c=document.getElementById('mainContent');
  if(currentTab==='beranda')c.innerHTML=renderBeranda();
  else if(currentTab==='tugas')c.innerHTML=renderTugas();
  else if(currentTab==='berkas')c.innerHTML=renderBerkas();
  else if(currentTab==='kalender')c.innerHTML=renderKalender();
  else if(currentTab==='kebiasaan')c.innerHTML=renderKebiasaan();
}

function taskCardHTML(t){
  const files=t.files||[];
  const bc=t.done?'badge-selesai':t.prioritas==='penting'?'badge-penting':'badge-biasa';
  const bl=t.done?'Selesai':t.prioritas==='penting'?'Penting':'Biasa';
  const imgs=files.filter(f=>f.type&&f.type.startsWith('image/')&&f.dataUrl);
  const thumbHTML=imgs.length>0?`<img src="${imgs[0].dataUrl}" class="attach-img-preview" alt="">` :'';
  const attachHTML=files.length>0?`<div class="attach-list">${files.map((f,i)=>`<div class="attach-item">
    ${f.dataUrl&&f.type&&f.type.startsWith('image/')?`<img src="${f.dataUrl}" class="attach-img-preview" alt="">`:`<span class="attach-icon">${fIcon(f.name)}</span>`}
    <span class="attach-name">${f.name}</span>
    <span class="attach-size">${fSize(f.size)}</span>
    ${f.dataUrl?`<button class="icon-btn view-btn" onclick="viewFile('${t.id}',${i})" title="Lihat">👁</button>`:''}
    <button class="icon-btn" onclick="delFile('${t.id}',${i})" title="Hapus">×</button>
  </div>`).join('')}</div>`:'';
  return`<div class="task-card${t.done?' done-card':''}">
    <div class="task-top">
      <button class="check-btn${t.done?' checked':''}" onclick="toggleTask('${t.id}')">${t.done?'✓':''}</button>
      <div class="task-body">
        <div class="task-title${t.done?' done-text':''}">${t.judul}</div>
        ${t.ket?`<div class="task-desc">${t.ket}</div>`:''}
      </div>
      ${thumbHTML}
      <div class="task-actions">
        <span class="badge ${bc}">${bl}</span>
        <button class="icon-btn" onclick="deleteTask('${t.id}')" title="Hapus">×</button>
      </div>
    </div>
    <div class="task-meta">
      <span class="meta-tag">${CAT_ICON[t.kat]||'📌'} ${t.kat}</span>
      ${t.tgl?`<span class="meta-tag">🕐 ${fDate(t.tgl)}</span>`:''}
      ${files.length>0?`<span class="meta-tag">📎 ${files.length} lampiran</span>`:''}
    </div>
    ${attachHTML}
    <button class="add-attach-btn" onclick="openAddFileModal('${t.id}')">+ Tambah lampiran</button>
  </div>`;
}

function renderBeranda(){
  const total=tasks.length,done=tasks.filter(t=>t.done).length;
  const penting=tasks.filter(t=>t.prioritas==='penting'&&!t.done).length;
  const totalFiles=tasks.reduce((a,t)=>a+(t.files?t.files.length:0),0);
  const pct=total?Math.round(done/total*100):0;
  const todayStr=now.toDateString();
  const todayTasks=tasks.filter(t=>!t.done&&t.tgl&&new Date(t.tgl).toDateString()===todayStr);
  const upcoming=tasks.filter(t=>!t.done&&(!t.tgl||new Date(t.tgl).toDateString()!==todayStr)).slice(0,3);
  return`<div class="section">
    <div class="stat-grid">
      <div class="stat-card s-purple"><div class="stat-num c-purple">${total}</div><div class="stat-label">Total Tugas</div></div>
      <div class="stat-card s-green"><div class="stat-num c-green">${done}</div><div class="stat-label">Selesai</div></div>
      <div class="stat-card s-amber"><div class="stat-num c-amber">${penting}</div><div class="stat-label">Penting</div></div>
      <div class="stat-card s-blue"><div class="stat-num c-blue">${totalFiles}</div><div class="stat-label">Berkas</div></div>
    </div>
    <div class="prog-wrap">
      <div class="prog-row"><span style="font-size:13px;font-weight:600">Progres kegiatan</span><span style="font-size:13px;font-weight:700;color:var(--purple)">${pct}%</span></div>
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="sec-title">Tugas hari ini (${todayTasks.length})</div>
    ${todayTasks.length===0?`<div class="empty"><div class="empty-icon">🎉</div><p>Tidak ada tugas hari ini!</p></div>`:todayTasks.map(t=>taskCardHTML(t)).join('')}
    ${upcoming.length>0?`<div class="sec-title" style="margin-top:18px">Akan datang</div>${upcoming.map(t=>taskCardHTML(t)).join('')}`:''}
  </div>`;
}

function renderTugas(){
  const cats=['semua','kerja','pribadi','kesehatan','belajar','lainnya'];
  const catLabel={semua:'Semua',kerja:'💼 Kerja',pribadi:'👤 Pribadi',kesehatan:'❤️ Kesehatan',belajar:'📚 Belajar',lainnya:'📌 Lainnya'};
  let filtered=filterCat==='semua'?tasks:tasks.filter(t=>t.kat===filterCat);
  const aktif=filtered.filter(t=>!t.done),selesai=filtered.filter(t=>t.done);
  return`<div class="section">
    <div class="cat-chips">${cats.map(c=>`<div class="cat-chip${filterCat===c?' active':''}" onclick="setFilter('${c}')">${catLabel[c]}</div>`).join('')}</div>
    <div class="sec-title">Aktif (${aktif.length})</div>
    ${aktif.length===0?`<div class="empty"><div class="empty-icon">📋</div><p>Belum ada tugas aktif</p></div>`:aktif.map(t=>taskCardHTML(t)).join('')}
    ${selesai.length>0?`<div class="sec-title" style="margin-top:18px">Selesai (${selesai.length})</div>${selesai.map(t=>taskCardHTML(t)).join('')}`:''}
  </div>`;
}

function renderBerkas(){
  const all=[];
  tasks.forEach(t=>(t.files||[]).forEach((f,i)=>all.push({...f,taskId:t.id,taskJudul:t.judul,fi:i})));
  if(all.length===0)return`<div class="section"><div class="empty"><div class="empty-icon">📁</div><p>Belum ada berkas yang diunggah.<br>Tambah tugas lalu lampirkan berkas.</p></div></div>`;
  const imgs=all.filter(f=>f.type&&f.type.startsWith('image/')&&f.dataUrl);
  const docs=all.filter(f=>!f.type||!f.type.startsWith('image/'));
  const totalSize=all.reduce((a,f)=>a+f.size,0);
  let html=`<div class="section">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <span style="font-size:15px;font-weight:700">Semua Berkas <span style="color:var(--purple)">(${all.length})</span></span>
      <span style="font-size:12px;color:var(--text-muted)">${fSize(totalSize)} total</span>
    </div>`;
  if(imgs.length>0){
    html+=`<div class="sec-title">Gambar (${imgs.length})</div><div class="berkas-img-grid">`;
    imgs.forEach(f=>{
      html+=`<div class="berkas-img-item" onclick="viewFileById('${f.taskId}',${f.fi})">
        <img src="${f.dataUrl}" alt="${f.name}">
        <div class="berkas-img-caption">
          <div class="berkas-img-name">${f.name}</div>
          <div class="berkas-img-sub">${f.taskJudul} · ${fSize(f.size)}</div>
        </div>
      </div>`;
    });
    html+=`</div>`;
  }
  if(docs.length>0){
    html+=`<div class="sec-title" style="margin-top:${imgs.length>0?'8':'0'}px">Dokumen & File (${docs.length})</div>`;
    docs.forEach(f=>{
      html+=`<div class="berkas-doc-card">
        <div class="berkas-doc-icon">${fIcon(f.name)}</div>
        <div class="berkas-doc-info">
          <div class="berkas-doc-name">${f.name}</div>
          <div class="berkas-doc-meta">${fSize(f.size)}</div>
          <div class="berkas-doc-task">${f.taskJudul}</div>
        </div>
        ${f.dataUrl?`<button class="icon-btn view-btn" onclick="viewFileById('${f.taskId}',${f.fi})">👁</button>`:''}
        <button class="icon-btn" onclick="delFileById('${f.taskId}',${f.fi})">×</button>
      </div>`;
    });
  }
  html+=`</div>`;
  return html;
}

function renderKalender(){
  const y=now.getFullYear(),m=now.getMonth();
  const first=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate();
  const taskDates=tasks.map(t=>t.tgl?new Date(t.tgl).toDateString():'');
  let cells='';
  for(let i=0;i<first;i++)cells+=`<div class="cal-day"></div>`;
  for(let d=1;d<=days;d++){
    const ds=new Date(y,m,d).toDateString();
    cells+=`<div class="cal-day${ds===now.toDateString()?' today':''}${taskDates.includes(ds)?' has-ev':''}">${d}</div>`;
  }
  const monthTasks=tasks.filter(t=>t.tgl&&new Date(t.tgl).getMonth()===m&&new Date(t.tgl).getFullYear()===y);
  return`<div class="section">
    <div class="cal-month">${MONTHS[m]} ${y}</div>
    <div class="cal-hdr">${['Min','Sen','Sel','Rab','Kam','Jum','Sab'].map(d=>`<span>${d}</span>`).join('')}</div>
    <div class="cal-grid">${cells}</div>
    <div class="sec-title" style="margin-top:20px">Kegiatan bulan ini (${monthTasks.length})</div>
    ${monthTasks.length===0?`<div class="empty"><div class="empty-icon">📅</div><p>Belum ada kegiatan</p></div>`:monthTasks.sort((a,b)=>new Date(a.tgl)-new Date(b.tgl)).map(t=>taskCardHTML(t)).join('')}
  </div>`;
}

function renderKebiasaan(){
  const todayKey=now.toISOString().split('T')[0];
  const last7=[];for(let i=6;i>=0;i--){const d=new Date(now);d.setDate(d.getDate()-i);last7.push(d.toISOString().split('T')[0]);}
  return`<div class="section">
    <div class="sec-title">Kebiasaan harian</div>
    ${habits.length===0?`<div class="empty"><div class="empty-icon">⚡</div><p>Belum ada kebiasaan.<br>Tekan + untuk menambahkan.</p></div>`:`<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:0 14px">${habits.map(h=>{
      const streak=calcStreak(h.id);
      const isDone=(habitLog[h.id]||{})[todayKey];
      return`<div class="habit-row">
        <span class="habit-icon">${h.icon}</span>
        <div class="habit-info">
          <div class="habit-name">${h.name}</div>
          <div class="habit-streak">🔥 ${streak} hari berturut</div>
        </div>
        <div class="habit-dots">${last7.map(dk=>`<div class="hdot${(habitLog[h.id]||{})[dk]?' done':''}"></div>`).join('')}</div>
        <button class="habit-check${isDone?' checked':''}" onclick="toggleHabit('${h.id}','${todayKey}')">${isDone?'✓ Done':'Tandai'}</button>
        <button class="icon-btn" onclick="deleteHabit('${h.id}')">×</button>
      </div>`;
    }).join('')}</div>`}
    ${habits.length>0?`<div style="margin-top:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px">
      <div class="sec-title" style="margin-bottom:10px">Ringkasan 7 hari terakhir</div>
      ${habits.map(h=>{const cnt=last7.filter(dk=>(habitLog[h.id]||{})[dk]).length;return`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><span>${h.icon}</span><span style="flex:1;font-size:13px;font-weight:500">${h.name}</span><span style="font-size:12px;font-weight:700;color:${cnt>=5?'var(--green)':cnt>=3?'var(--amber)':'var(--red)'}">${cnt}/7</span></div>`;}).join('')}
    </div>`:''}
  </div>`;
}

function calcStreak(hid){
  let s=0;const d=new Date(now);
  while(true){const k=d.toISOString().split('T')[0];if((habitLog[hid]||{})[k]){s++;d.setDate(d.getDate()-1);}else break;}
  return s;
}

function openAddModal(){
  addFileForId=null;pendingFiles=[];
  document.getElementById('iJudul').value='';document.getElementById('iKet').value='';
  document.getElementById('iTgl').value='';document.getElementById('pendingFiles').innerHTML='';
  document.getElementById('modalTitle').textContent='Tambah Tugas';
  document.getElementById('taskModal').classList.add('open');
}
function openAddFileModal(tid){
  addFileForId=tid;pendingFiles=[];
  const t=tasks.find(t=>t.id===tid);
  document.getElementById('iJudul').value=t?t.judul:'';
  document.getElementById('iKet').value='';document.getElementById('iTgl').value='';
  document.getElementById('pendingFiles').innerHTML='';
  document.getElementById('modalTitle').textContent='Tambah Lampiran';
  document.getElementById('taskModal').classList.add('open');
}
function closeTaskModal(){document.getElementById('taskModal').classList.remove('open');pendingFiles=[];}

document.getElementById('fileInput').onchange=function(){Array.from(this.files).forEach(readFile);this.value='';};

const uz=document.getElementById('uploadZone');
uz.ondragover=e=>{e.preventDefault();uz.classList.add('drag');};
uz.ondragleave=()=>uz.classList.remove('drag');
uz.ondrop=e=>{e.preventDefault();uz.classList.remove('drag');Array.from(e.dataTransfer.files).forEach(readFile);};

function readFile(file){
  const isImgOrPdf=file.type.startsWith('image/')||file.type==='application/pdf';
  const obj={name:file.name,size:file.size,type:file.type,dataUrl:null};
  if(isImgOrPdf){
    const r=new FileReader();
    r.onload=ev=>{obj.dataUrl=ev.target.result;pendingFiles.push(obj);renderPending();};
    r.readAsDataURL(file);
  }else{pendingFiles.push(obj);renderPending();}
}
function renderPending(){
  document.getElementById('pendingFiles').innerHTML=pendingFiles.map((f,i)=>`<div class="pf-item">
    ${f.dataUrl&&f.type.startsWith('image/')?`<img src="${f.dataUrl}" style="width:30px;height:30px;border-radius:6px;object-fit:cover">`:`<span class="pf-icon">${fIcon(f.name)}</span>`}
    <span class="pf-name">${f.name}</span><span class="pf-size">${fSize(f.size)}</span>
    <button class="pf-rm" onclick="removePending(${i})">×</button>
  </div>`).join('');
}
function removePending(i){pendingFiles.splice(i,1);renderPending();}

function saveTask(){
  if(addFileForId){
    const t=tasks.find(t=>t.id===addFileForId);
    if(t){if(!t.files)t.files=[];t.files.push(...pendingFiles);}
    save();closeTaskModal();render();return;
  }
  const j=document.getElementById('iJudul').value.trim();
  if(!j){alert('Judul tidak boleh kosong');return;}
  tasks.push({id:Date.now().toString(),judul:j,ket:document.getElementById('iKet').value,tgl:document.getElementById('iTgl').value,prioritas:document.getElementById('iPrioritas').value,kat:document.getElementById('iKat').value,done:false,files:[...pendingFiles]});
  save();closeTaskModal();render();
}

function toggleTask(id){const t=tasks.find(t=>t.id===id);if(t)t.done=!t.done;save();render();}
function deleteTask(id){if(confirm('Hapus tugas ini?')){tasks=tasks.filter(t=>t.id!==id);save();render();}}
function setFilter(c){filterCat=c;render();}

function saveHabit(){
  const n=document.getElementById('iHabit').value.trim();
  if(!n){alert('Nama tidak boleh kosong');return;}
  habits.push({id:Date.now().toString(),name:n,icon:document.getElementById('iHabitIcon').value});
  save();document.getElementById('habitModal').classList.remove('open');render();
}
function toggleHabit(hid,dk){if(!habitLog[hid])habitLog[hid]={};habitLog[hid][dk]=!habitLog[hid][dk];save();render();}
function deleteHabit(id){if(confirm('Hapus kebiasaan ini?')){habits=habits.filter(h=>h.id!==id);save();render();}}

function delFile(tid,idx){const t=tasks.find(t=>t.id===tid);if(t&&t.files){t.files.splice(idx,1);}save();render();}
function delFileById(tid,idx){delFile(tid,idx);}

function viewFile(tid,idx){const t=tasks.find(t=>t.id===tid);if(!t||!t.files)return;showViewModal(t.files[idx]);}
function viewFileById(tid,idx){viewFile(tid,idx);}

function showViewModal(f){
  document.getElementById('viewTitle').textContent=f.name;
  let html='';
  if(f.dataUrl&&f.type&&f.type.startsWith('image/')){
    html=`<img src="${f.dataUrl}" class="view-img" alt="${f.name}"><div style="margin-top:8px;font-size:12px;color:var(--text-muted)">${fSize(f.size)}</div>`;
  }else{
    html=`<div class="view-doc-wrap">
      <div class="view-doc-icon">${fIcon(f.name)}</div>
      <div class="view-doc-name">${f.name}</div>
      <div class="view-doc-size">${fSize(f.size)}</div>
      ${f.dataUrl?`<a href="${f.dataUrl}" download="${f.name}" class="download-btn">⬇ Unduh Berkas</a>`:
      `<div style="margin-top:12px;font-size:12px;color:var(--text-muted)">File ini tidak bisa dipratinjau. Hanya metadata yang tersimpan.</div>`}
    </div>`;
  }
  document.getElementById('viewContent').innerHTML=html;
  document.getElementById('viewModal').classList.add('open');
}

document.getElementById('taskModal').addEventListener('click',function(e){if(e.target===this)closeTaskModal();});
document.getElementById('habitModal').addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});
document.getElementById('viewModal').addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});

document.getElementById('fabBtn').onclick=openAddModal;
render();
</script>
</body>
</html>
